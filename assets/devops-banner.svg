<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="50%" style="stop-color:#bc8cff"/>
      <stop offset="100%" style="stop-color:#f778ba"/>
    </linearGradient>
    <linearGradient id="pipeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.1"/>
      <stop offset="50%" style="stop-color:#58a6ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#58a6ff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="300"/><line x1="30" y1="0" x2="30" y2="300"/>
    <line x1="60" y1="0" x2="60" y2="300"/><line x1="90" y1="0" x2="90" y2="300"/>
    <line x1="120" y1="0" x2="120" y2="300"/><line x1="150" y1="0" x2="150" y2="300"/>
    <line x1="180" y1="0" x2="180" y2="300"/><line x1="210" y1="0" x2="210" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/><line x1="270" y1="0" x2="270" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/><line x1="330" y1="0" x2="330" y2="300"/>
    <line x1="360" y1="0" x2="360" y2="300"/><line x1="390" y1="0" x2="390" y2="300"/>
    <line x1="420" y1="0" x2="420" y2="300"/><line x1="450" y1="0" x2="450" y2="300"/>
    <line x1="480" y1="0" x2="480" y2="300"/><line x1="510" y1="0" x2="510" y2="300"/>
    <line x1="540" y1="0" x2="540" y2="300"/><line x1="570" y1="0" x2="570" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/><line x1="630" y1="0" x2="630" y2="300"/>
    <line x1="660" y1="0" x2="660" y2="300"/><line x1="690" y1="0" x2="690" y2="300"/>
    <line x1="720" y1="0" x2="720" y2="300"/><line x1="750" y1="0" x2="750" y2="300"/>
    <line x1="780" y1="0" x2="780" y2="300"/><line x1="810" y1="0" x2="810" y2="300"/>
    <line x1="840" y1="0" x2="840" y2="300"/><line x1="870" y1="0" x2="870" y2="300"/>
    <line x1="900" y1="0" x2="900" y2="300"/>
    <line x1="0" y1="0" x2="900" y2="0"/><line x1="0" y1="30" x2="900" y2="30"/>
    <line x1="0" y1="60" x2="900" y2="60"/><line x1="0" y1="90" x2="900" y2="90"/>
    <line x1="0" y1="120" x2="900" y2="120"/><line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="0" y1="180" x2="900" y2="180"/><line x1="0" y1="210" x2="900" y2="210"/>
    <line x1="0" y1="240" x2="900" y2="240"/><line x1="0" y1="270" x2="900" y2="270"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
  </g>

  <!-- Animated floating particles -->
  <g filter="url(#softGlow)">
    <circle cx="80" cy="60" r="2" fill="#58a6ff" opacity="0.4">
      <animate attributeName="cy" values="60;40;60" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="240" r="1.5" fill="#bc8cff" opacity="0.3">
      <animate attributeName="cy" values="240;220;240" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="80" r="2.5" fill="#f778ba" opacity="0.3">
      <animate attributeName="cy" values="80;55;80" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="830" cy="200" r="1.5" fill="#58a6ff" opacity="0.4">
      <animate attributeName="cy" values="200;180;200" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="30" r="1" fill="#bc8cff" opacity="0.3">
      <animate attributeName="cy" values="30;15;30" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="620" cy="270" r="1.5" fill="#58a6ff" opacity="0.3">
      <animate attributeName="cy" values="270;255;270" dur="5.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- CI/CD Pipeline illustration (left side) -->
  <g transform="translate(60, 120)" opacity="0.15">
    <!-- Pipeline line -->
    <line x1="0" y1="30" x2="180" y2="30" stroke="#58a6ff" stroke-width="2" stroke-dasharray="6,4">
      <animate attributeName="stroke-dashoffset" values="0;-20" dur="2s" repeatCount="indefinite"/>
    </line>
    <!-- Pipeline nodes -->
    <circle cx="0" cy="30" r="8" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="0" y="34" text-anchor="middle" fill="#58a6ff" font-size="10" font-family="monospace">C</text>
    <circle cx="60" cy="30" r="8" fill="none" stroke="#bc8cff" stroke-width="1.5"/>
    <text x="60" y="34" text-anchor="middle" fill="#bc8cff" font-size="10" font-family="monospace">B</text>
    <circle cx="120" cy="30" r="8" fill="none" stroke="#f778ba" stroke-width="1.5"/>
    <text x="120" y="34" text-anchor="middle" fill="#f778ba" font-size="10" font-family="monospace">T</text>
    <circle cx="180" cy="30" r="8" fill="none" stroke="#3fb950" stroke-width="1.5"/>
    <text x="180" y="34" text-anchor="middle" fill="#3fb950" font-size="10" font-family="monospace">D</text>
  </g>

  <!-- Kubernetes wheel (right side) -->
  <g transform="translate(780, 90)" opacity="0.12">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#326CE5" stroke-width="1.5"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
      <circle cx="0" cy="-22" r="5" fill="none" stroke="#326CE5" stroke-width="1"/>
      <circle cx="19" cy="11" r="5" fill="none" stroke="#326CE5" stroke-width="1"/>
      <circle cx="-19" cy="11" r="5" fill="none" stroke="#326CE5" stroke-width="1"/>
      <circle cx="19" cy="-11" r="5" fill="none" stroke="#326CE5" stroke-width="1"/>
      <circle cx="-19" cy="-11" r="5" fill="none" stroke="#326CE5" stroke-width="1"/>
      <circle cx="0" cy="22" r="5" fill="none" stroke="#326CE5" stroke-width="1"/>
      <line x1="0" y1="-22" x2="0" y2="0" stroke="#326CE5" stroke-width="0.8"/>
      <line x1="19" y1="11" x2="0" y2="0" stroke="#326CE5" stroke-width="0.8"/>
      <line x1="-19" y1="11" x2="0" y2="0" stroke="#326CE5" stroke-width="0.8"/>
    </g>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#326CE5" stroke-width="1.5"/>
  </g>

  <!-- Cloud icon (top right) -->
  <g transform="translate(700, 50)" opacity="0.1">
    <path d="M30,35 Q15,35 10,27 Q5,20 12,14 Q10,5 20,3 Q30,-2 37,5 Q42,0 50,5 Q58,10 55,18 Q62,22 58,30 Q55,35 45,35 Z" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
  </g>

  <!-- Terminal icon (bottom right) -->
  <g transform="translate(720, 210)" opacity="0.1">
    <rect x="0" y="0" width="50" height="35" rx="3" fill="none" stroke="#3fb950" stroke-width="1.5"/>
    <text x="8" y="22" fill="#3fb950" font-family="monospace" font-size="12">$_</text>
    <line x1="22" y1="22" x2="32" y2="22" stroke="#3fb950" stroke-width="1.5">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Infinity/DevOps loop (left bottom) -->
  <g transform="translate(100, 220)" opacity="0.1">
    <path d="M0,0 C-15,-20 -15,-40 0,-40 C15,-40 15,-20 0,0 C15,20 15,40 0,40 C-15,40 -15,20 0,0" fill="none" stroke="#bc8cff" stroke-width="1.5" transform="rotate(90) scale(0.5)">
      <animate attributeName="stroke-dashoffset" values="0;-200" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Main text -->
  <text x="450" y="115" text-anchor="middle" fill="url(#accent)" font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="bold" filter="url(#glow)">
    Prasham Tated
  </text>

  <!-- Subtitle -->
  <text x="450" y="155" text-anchor="middle" fill="#8b949e" font-family="'Segoe UI', Arial, sans-serif" font-size="18" letter-spacing="3">
    SENIOR DEVOPS ENGINEER
  </text>

  <!-- Accent line under subtitle -->
  <rect x="320" y="170" width="260" height="2" rx="1" fill="url(#accent)" opacity="0.6">
    <animate attributeName="width" values="200;260;200" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="x" values="350;320;350" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Tech tags -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="12">
    <!-- Kubernetes tag -->
    <rect x="218" y="192" width="95" height="26" rx="13" fill="none" stroke="#326CE5" stroke-width="1" opacity="0.6"/>
    <text x="265" y="209" text-anchor="middle" fill="#326CE5" opacity="0.8">Kubernetes</text>

    <!-- GitOps tag -->
    <rect x="325" y="192" width="70" height="26" rx="13" fill="none" stroke="#f778ba" stroke-width="1" opacity="0.6"/>
    <text x="360" y="209" text-anchor="middle" fill="#f778ba" opacity="0.8">GitOps</text>

    <!-- CI/CD tag -->
    <rect x="407" y="192" width="65" height="26" rx="13" fill="none" stroke="#bc8cff" stroke-width="1" opacity="0.6"/>
    <text x="440" y="209" text-anchor="middle" fill="#bc8cff" opacity="0.8">CI/CD</text>

    <!-- Cloud tag -->
    <rect x="484" y="192" width="65" height="26" rx="13" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.6"/>
    <text x="517" y="209" text-anchor="middle" fill="#58a6ff" opacity="0.8">Cloud</text>

    <!-- SRE tag -->
    <rect x="561" y="192" width="55" height="26" rx="13" fill="none" stroke="#3fb950" stroke-width="1" opacity="0.6"/>
    <text x="588" y="209" text-anchor="middle" fill="#3fb950" opacity="0.8">SRE</text>

    <!-- Terraform tag -->
    <rect x="628" y="192" width="85" height="26" rx="13" fill="none" stroke="#7B42BC" stroke-width="1" opacity="0.6"/>
    <text x="670" y="209" text-anchor="middle" fill="#7B42BC" opacity="0.8">Terraform</text>
  </g>

  <!-- Tagline -->
  <text x="450" y="260" text-anchor="middle" fill="#6e7681" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-style="italic" letter-spacing="1">
    "Automate everything, monitor relentlessly, deploy fearlessly."
  </text>

  <!-- Bottom accent border -->
  <rect x="0" y="296" width="900" height="4" fill="url(#accent)" opacity="0.4"/>
</svg>
